apiVersion: v1
kind: Service
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
  annotations:
    cloud.google.com/backend-config: '{"ports":{"api":"{{ include "spring-boot-api.fullname" . }}"}}'
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "spring-boot-api.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.service.ports.api }}
      targetPort: {{ .Values.service.ports.api }}
      protocol: TCP
    - name: logs
      port: {{ .Values.service.ports.logs }}
      targetPort: {{ .Values.service.ports.logs }}
      protocol: TCP
    - name: soap
      port: {{ .Values.service.ports.soap }}
      targetPort: {{ .Values.service.ports.soap }}
      protocol: TCP
