apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
spec:
  healthCheck:
    type: HTTP
    port: {{ .Values.service.ports.api }}
    requestPath: /service/health
