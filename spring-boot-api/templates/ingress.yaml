apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "spring-boot-api.fullname" . }}
                port:
                  name: api
          - path: /service
            pathType: Prefix
            backend:
              service:
                name: {{ include "spring-boot-api.fullname" . }}
                port:
                  name: api
