{{/*
  Secret values are generated randomly on first install and then preserved on
  subsequent upgrades by looking up the existing Secret via the Helm `lookup`
  function.  This keeps values stable across re-renders while still seeding
  them automatically when the chart is first applied.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "spring-boot-api.fullname" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spring-boot-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $existing }}
  APP_SECRET_KEY: {{ index $existing.data "APP_SECRET_KEY" }}
  API_TOKEN:      {{ index $existing.data "API_TOKEN" }}
  {{- else }}
  APP_SECRET_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  API_TOKEN:      {{ randAlphaNum 48 | b64enc | quote }}
  {{- end }}
